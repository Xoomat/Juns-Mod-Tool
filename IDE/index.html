<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Juns Mod Tool</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-frame">
      <header class="topbar">
        <div class="topbar__title">
          <span class="topbar__name">Juns Mod Tool</span>
        </div>
        <div class="topbar__actions">
          <button id="refreshModsButton" class="game-button">Refresh List</button>
          <button id="saveModButton" class="game-button game-button--green">Save Current Tab</button>
        </div>
      </header>

      <nav id="workspaceTabs" class="workspace-tabs"></nav>

      <main class="workspace">
        <section id="homeView" class="screen screen--active">
          <div class="screen-header">
            <h1>Mods</h1>
            <div class="screen-actions">
              <button id="openSelectedModButton" class="game-button game-button--green">Open Mod</button>
              <button id="showCreateModalButton" class="game-button">Create Mod</button>
            </div>
          </div>

          <div class="home-layout">
            <section class="game-panel">
              <div class="game-panel__title">Mod Description</div>
              <div id="homeDetails" class="home-details"></div>
              <div class="home-actions">
                <button id="homeReloadButton" class="game-button">Reload Mod</button>
                <button id="homeOpenFolderButton" class="game-button">Mods Folder</button>
              </div>
            </section>

            <section class="game-panel">
              <div class="game-panel__title game-panel__title--with-count">
                <span>Mods List</span>
                <span id="modCountBadge" class="counter">0</span>
              </div>
              <div id="modsList" class="mods-list"></div>
            </section>
          </div>
        </section>

        <section id="editorView" class="screen">
          <div class="screen-header">
            <div>
              <h1 id="selectedModTitle">No Tab</h1>
              <div id="selectedModMeta" class="screen-subtitle">Open a mod from Home.</div>
            </div>
            <div class="screen-actions">
              <button id="packCurrentModButton" class="game-button">Pack Current</button>
              <button id="reloadCurrentModButton" class="game-button">Reload Tab</button>
            </div>
          </div>

          <div class="editor-layout">
            <div class="editor-main">
              <section class="game-panel">
                <div class="game-panel__title">mod.json</div>
                <form id="modMetaForm" class="form-grid">
                  <label class="field field--wide">
                    <span>Name</span>
                    <input id="modNameInput" />
                  </label>
                  <label class="field field--wide">
                    <span>Description</span>
                    <textarea id="modDescriptionInput" rows="5"></textarea>
                  </label>
                  <label class="field">
                    <span>Target version</span>
                    <input id="modTargetVersionInput" />
                  </label>
                  <label class="field">
                    <span>Folder</span>
                    <input id="modFolderInput" disabled />
                  </label>
                  <label class="field">
                    <span>Status</span>
                    <input id="modStorageStatusInput" disabled />
                  </label>
                  <label class="field field--wide">
                    <span>GUID</span>
                    <div class="field-row">
                      <input id="modGuidInput" />
                      <button id="generateGuidButton" type="button" class="game-button">New GUID</button>
                    </div>
                  </label>
                </form>
              </section>

              <section class="game-panel">
                <div class="game-panel__title game-panel__title--with-actions">
                  <span>Lua Files</span>
                  <div class="inline-actions">
                    <button id="addLuaFileButton" type="button" class="game-button">Add File</button>
                    <button id="removeLuaFileButton" type="button" class="game-button game-button--red">Remove Current</button>
                  </div>
                </div>
                <div id="luaTabs" class="lua-tabs"></div>
                <textarea id="luaEditor" class="code-editor" spellcheck="false"></textarea>
              </section>
            </div>

            <aside class="editor-side">
              <section id="itemListView" class="game-panel">
                <div class="game-panel__title game-panel__title--with-actions">
                  <span>Items In Current Lua</span>
                  <div class="inline-actions">
                    <button type="button" id="newItemPrefabButton" class="game-button">New Item</button>
                  </div>
                </div>
                <div id="itemPrefabList" class="item-prefab-list"></div>
              </section>

              <section id="itemEditorView" class="game-panel hidden">
                <div class="game-panel__title game-panel__title--with-actions">
                  <span>Edit Item</span>
                  <div class="inline-actions">
                    <button type="button" id="backToItemListButton" class="game-button">Back</button>
                    <button type="button" id="deleteItemPrefabButton" class="game-button game-button--red">Delete Item</button>
                  </div>
                </div>
                <form id="generatorForm" class="form-stack">
                  <div class="form-grid">
                    <label class="field">
                      <span>Source mode</span>
                      <select name="sourceMode" id="sourceModeSelect">
                        <option value="create">CreateItemPrefab</option>
                        <option value="clone_vanilla">Clone vanilla item</option>
                      </select>
                    </label>
                    <label class="field">
                      <span>Vanilla item ID</span>
                      <input name="baseVanillaId" type="number" value="8" />
                    </label>
                    <label class="field field--wide">
                      <span>Item name</span>
                      <input name="itemName" placeholder="Cow Stocking R" />
                    </label>
                    <label class="field field--wide">
                      <span>Item description</span>
                      <textarea name="itemDescription" rows="4"></textarea>
                    </label>
                    <label class="field">
                      <span>Price</span>
                      <input name="price" type="number" value="3000" />
                    </label>
                    <label class="field">
                      <span>Shop</span>
                      <select name="shopId" id="shopIdSelect"></select>
                    </label>
                    <label class="field">
                      <span>Category</span>
                      <select name="category" id="categorySelect"></select>
                    </label>
                    <label class="field">
                      <span>Scratch type</span>
                      <select name="scratchType" id="scratchTypeSelect"></select>
                    </label>
                    <label class="field">
                      <span>Possible slots</span>
                      <input name="possibleEquipmentSlots" list="equipmentSlots" />
                    </label>
                    <label class="field">
                      <span>Required slots</span>
                      <input name="requiredSlots" list="equipmentSlots" />
                    </label>
                    <label class="field">
                      <span>Use SlotData</span>
                      <select name="useSlotData" id="useSlotDataSelect">
                        <option value="false">No</option>
                        <option value="true">Yes</option>
                      </select>
                    </label>
                    <label class="field">
                      <span>Target slot string</span>
                      <input name="targetSlotString" placeholder="UpperBody" />
                    </label>
                    <label class="field field--wide">
                      <span>Controller override</span>
                      <input name="controllerElementOverride" placeholder="UpperBody_Dress2" />
                    </label>
                    <label class="field">
                      <span>Forbidden slots</span>
                      <input name="forbiddenSlots" placeholder="LowerBody, UpperBodyOuter" />
                    </label>
                    <label class="field">
                      <span>Partners</span>
                      <input name="partners" />
                    </label>
                    <label class="field">
                      <span>Color slots</span>
                      <input name="colorSlots" />
                    </label>
                    <label class="field">
                      <span>Color palette</span>
                      <input name="colorPalette" value="partpalette" />
                    </label>
                    <label class="field">
                      <span>Sus modifiers</span>
                      <input name="susModifiers" placeholder="LegR:0.5" />
                    </label>
                  </div>

                  <div class="toggle-row">
                    <label><input type="checkbox" name="isIllegal" /> Illegal</label>
                    <label><input type="checkbox" name="hasQuality" /> Quality</label>
                    <label><input type="checkbox" name="isStackable" /> Stackable</label>
                    <label><input type="checkbox" name="canChangeColor" checked /> Color</label>
                    <label><input type="checkbox" name="throwingOutForbidden" /> Throwing out forbidden</label>
                  </div>

                  <div class="subpanel">
                    <div class="game-panel__title game-panel__title--with-actions">
                      <span>Packed Textures</span>
                      <button type="button" id="addTextureButton" class="game-button">Add Texture</button>
                    </div>
                    <div id="texturesContainer" class="texture-list"></div>
                  </div>

                  <button type="button" id="saveItemPrefabButton" class="game-button game-button--green">Save Item</button>
                </form>
              </section>

              <section class="game-panel">
                <div class="game-panel__title">Workspace</div>
                <dl id="pathsInfo" class="paths"></dl>
              </section>

              <section class="game-panel">
                <div class="game-panel__title">Status</div>
                <div id="statusBox" class="status-box">Ready.</div>
              </section>
            </aside>
          </div>
        </section>
      </main>
    </div>

    <div id="createModal" class="modal hidden">
      <div class="modal__panel">
        <div class="game-panel__title game-panel__title--with-actions">
          <span>Create New Mod</span>
          <button id="closeCreateModalButton" type="button" class="game-button game-button--red">Close</button>
        </div>
        <form id="createModForm" class="form-stack">
          <label class="field">
            <span>Folder name</span>
            <input name="folderName" placeholder="My_First_Mod" required />
          </label>
          <label class="field">
            <span>Display name</span>
            <input name="name" placeholder="My First Mod" required />
          </label>
          <label class="field">
            <span>Target version</span>
            <input name="targetVersion" placeholder="0.90.15" />
          </label>
          <label class="field">
            <span>Main Lua file</span>
            <input name="mainLuaFile" value="script.lua" />
          </label>
          <label class="field">
            <span>Description</span>
            <textarea name="description" rows="4"></textarea>
          </label>
          <button type="submit" class="game-button game-button--green">Create Mod</button>
        </form>
      </div>
    </div>

    <datalist id="equipmentSlots"></datalist>
    <script src="./renderer.js"></script>
  </body>
</html>
