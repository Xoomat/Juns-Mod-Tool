<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data:;"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>June Mod Tools</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="menu-bar">
        <div class="programicon">
          <img src="./icons/Icon.png" alt="JunesModTools" />
        </div>
        <button id="fileMenuButton" class="menu-bar__button">File</button>
        <button id="editMenuButton" class="menu-bar__button">Edit</button>
        <button id="viewMenuButton" class="menu-bar__button">View</button>
        <div class="window-controls">
          <button id="minimizeBtn" class="window-btn minimize" title="Minimize">
            <img src="./icons/minimize.png" alt="Minimize" />
          </button>
          <button id="maximizeBtn" class="window-btn maximize" title="Maximize">
            <img src="./icons/maximize.png" alt="Maximize" />
          </button>
          <button id="closeBtn" class="window-btn close" title="Close">
            <img src="./icons/close.png" alt="Close" />
          </button>
        </div>
      </header>

      <div class="app-body">
        <aside class="activity-bar">
          <button id="activityModsButton" class="activity-bar__button activity-bar__button--active" title="Mods">
            <img src="./icons/ModsListIcon.png" alt="Mods" />
          </button>
          <button id="activityExplorerButton" class="activity-bar__button" title="Explorer">
            <img src="./icons/ModFilesIcon.png" alt="Explorer" />
          </button>
          <button id="settingsButton" class="activity-bar__button activity-bar__button--bottom" title="Settings">
            <img src="./icons/SettingsIcon.png" alt="Settings" />
          </button>
        </aside>

        <aside class="sidebar">
          <div class="sidebar__header">
            <div id="explorerTitle" class="sidebar__title">MOD EXPLORER</div>
            <div id="explorerMeta" class="sidebar__meta">No mod selected</div>
          </div>

          <div id="modsPane" class="sidebar__pane sidebar__pane--active">
            <div id="modsList" class="mods-list"></div>
          </div>

          <div id="modSectionsPane" class="sidebar__pane">
            <div class="tree-group">
              <button id="sectionInfoButton" class="tree-item tree-item--active" data-section="info">Information</button>
              <button id="sectionLuaButton" class="tree-item" data-section="lua">Lua</button>
              <button id="sectionItemsButton" class="tree-item" data-section="items">Items</button>
            </div>
          </div>
        </aside>

        <main class="workspace">
          <nav id="workspaceTabs" class="workspace-tabs"></nav>

          <div id="editorPlaceholder" class="placeholder placeholder--active">
            <div class="placeholder__title">Open or create a mod to start editing</div>
            <div class="placeholder__subtitle">Use the mod explorer on the left.</div>
          </div>

          <div id="editorShell" class="editor-shell">
            <section id="panel-info" class="editor-panel editor-panel--active">
              <div class="panel">
                <div class="panel__title">mod.json</div>
                <form id="modMetaForm" class="form-grid">
                  <label class="field field--wide">
                    <span>Name</span>
                    <input id="modNameInput" class="field__input" />
                  </label>
                  <label class="field field--wide">
                    <span>Description</span>
                    <textarea id="modDescriptionInput" class="field__textarea" rows="6"></textarea>
                  </label>
                  <label class="field">
                    <span>Target version</span>
                    <input id="modTargetVersionInput" class="field__input" />
                  </label>
                  <label class="field">
                    <span>GUID</span>
                    <input id="modGuidInput" class="field__input" />
                  </label>
                  <label class="field">
                    <span>Folder</span>
                    <input id="modFolderInput" class="field__input" disabled />
                  </label>
                  <label class="field">
                    <span>Status</span>
                    <input id="modStorageStatusInput" class="field__input" disabled />
                  </label>
                  <div class="field-actions">
                    <button id="generateGuidButton" type="button" class="toolbar-button">New GUID</button>
                    <button id="saveModButton" type="button" class="toolbar-button toolbar-button--primary">Save</button>
                    <button id="packCurrentModButton" type="button" class="toolbar-button">Pack</button>
                  </div>
                </form>
              </div>
            </section>

            <section id="panel-lua" class="editor-panel">
              <div class="panel panel--fill">
                <div class="panel__title panel__title--row">
                  <span>Lua Files</span>
                  <div class="panel__actions">
                    <button id="addLuaFileButton" type="button" class="toolbar-button">Add File</button>
                    <button id="removeLuaFileButton" type="button" class="toolbar-button toolbar-button--danger">Remove File</button>
                  </div>
                </div>
                <div id="luaTabs" class="subtabs"></div>
                <textarea id="luaEditor" class="code-editor" spellcheck="false"></textarea>
              </div>
            </section>

            <section id="panel-items" class="editor-panel">
              <div id="itemListView" class="panel panel--fill">
                <div class="panel__title panel__title--row">
                  <span>Items in Current Lua</span>
                  <button id="newItemPrefabButton" type="button" class="toolbar-button">New Item</button>
                </div>
                <div id="itemPrefabList" class="item-list"></div>
              </div>

              <div id="itemEditorView" class="panel panel--fill hidden">
                <div class="panel__title panel__title--row">
                  <span>Edit Item</span>
                  <div class="panel__actions">
                    <button id="backToItemListButton" type="button" class="toolbar-button">Back</button>
                    <button id="deleteItemPrefabButton" type="button" class="toolbar-button toolbar-button--danger">Delete</button>
                    <button id="saveItemPrefabButton" type="button" class="toolbar-button toolbar-button--primary">Save Item</button>
                  </div>
                </div>

                <form id="generatorForm" class="form-grid form-grid--item">
                  <label class="field">
                    <span>Source mode</span>
                    <select name="sourceMode" class="field__select">
                      <option value="create">Create new prefab</option>
                    </select>
                  </label>
                  <label class="field">
                    <span>ID</span>
                    <input name="baseVanillaId" type="number" class="field__input" value="0" />
                  </label>
                  <label class="field field--wide">
                    <span>Item name</span>
                    <input name="itemName" class="field__input" />
                  </label>
                  <label class="field field--wide">
                    <span>Description</span>
                    <textarea name="itemDescription" class="field__textarea" rows="4"></textarea>
                  </label>
                  <label class="field">
                    <span>Price</span>
                    <input name="price" type="number" class="field__input" value="3000" />
                  </label>
                  <label class="field">
                    <span>Shop</span>
                    <select name="shopId" id="shopIdSelect" class="field__select"></select>
                  </label>
                  <label class="field">
                    <span>Category</span>
                    <select name="category" id="categorySelect" class="field__select"></select>
                  </label>
                  <label class="field">
                    <span>Scratch type</span>
                    <select name="scratchType" id="scratchTypeSelect" class="field__select"></select>
                  </label>
                  <label class="field field--wide">
                    <span>Possible slots</span>
                    <input name="possibleEquipmentSlots" class="field__input" list="equipmentSlots" />
                  </label>
                  <label class="field field--wide">
                    <span>Required slots</span>
                    <input name="requiredSlots" class="field__input" list="equipmentSlots" />
                  </label>
                  <label class="field">
                    <span>Use SlotData</span>
                    <select name="useSlotData" class="field__select">
                      <option value="false">No</option>
                      <option value="true">Yes</option>
                    </select>
                  </label>
                  <label class="field">
                    <span>Target slot string</span>
                    <input name="targetSlotString" class="field__input" />
                  </label>
                  <label class="field field--wide">
                    <span>Controller override</span>
                    <input name="controllerElementOverride" class="field__input" />
                  </label>
                  <label class="field field--wide">
                    <span>Forbidden slots</span>
                    <input name="forbiddenSlots" class="field__input" />
                  </label>
                  <label class="field">
                    <span>Partners</span>
                    <input name="partners" class="field__input" />
                  </label>
                  <label class="field">
                    <span>Color slots</span>
                    <input name="colorSlots" class="field__input" />
                  </label>
                  <label class="field">
                    <span>Color palette</span>
                    <input name="colorPalette" class="field__input" value="partpalette" />
                  </label>
                  <label class="field">
                    <span>Sus modifiers</span>
                    <input name="susModifiers" class="field__input" />
                  </label>

                  <div class="toggle-row field field--wide">
                    <label><input name="isIllegal" type="checkbox" /> Illegal</label>
                    <label><input name="hasQuality" type="checkbox" /> Quality</label>
                    <label><input name="isStackable" type="checkbox" /> Stackable</label>
                    <label><input name="canChangeColor" type="checkbox" checked /> Color</label>
                    <label><input name="throwingOutForbidden" type="checkbox" /> Throw out forbidden</label>
                  </div>

                  <div class="texture-panel field field--wide">
                    <div class="panel__title panel__title--row panel__title--nested">
                      <span>Packed Textures</span>
                      <button id="addTextureButton" type="button" class="toolbar-button">Add Texture</button>
                    </div>
                    <div id="texturesContainer" class="texture-list"></div>
                  </div>
                </form>
              </div>
            </section>
          </div>
        </main>
      </div>

      <footer class="status-bar">
        <div id="statusBox" class="status-bar__text">Ready.</div>
      </footer>
    </div>

    <div id="createModal" class="modal hidden">
      <div class="modal__panel">
        <div class="modal__header">
          <h2>Create New Mod</h2>
          <button id="closeCreateModalButton" type="button" class="modal__close">&times;</button>
        </div>
        <form id="createModForm" class="modal__form">
          <label class="field">
            <span>Display name</span>
            <input name="name" class="field__input" placeholder="My Mod" required />
          </label>
          <label class="field">
            <span>Target version</span>
            <input name="targetVersion" class="field__input" placeholder="0.90.16" />
          </label>
          <label class="field">
            <span>Main Lua file</span>
            <input name="mainLuaFile" class="field__input" value="script.lua" />
          </label>
          <label class="field">
            <span>Description</span>
            <textarea name="description" class="field__textarea" rows="4"></textarea>
          </label>
          <div class="modal__actions">
            <button type="submit" class="toolbar-button toolbar-button--primary">Create</button>
            <button id="closeCreateModalButton2" type="button" class="toolbar-button">Cancel</button>
          </div>
        </form>
      </div>
    </div>

    <div id="contextMenu" class="context-menu hidden">
      <button id="contextMenuOpen" class="context-menu__item">Open</button>
      <button id="contextMenuPack" class="context-menu__item">Pack</button>
      <button id="contextMenuDuplicate" class="context-menu__item">Duplicate</button>
      <button id="contextMenuDelete" class="context-menu__item context-menu__item--danger">Delete</button>
    </div>

    <div id="itemContextMenu" class="context-menu hidden">
      <button id="itemContextMenuDuplicate" class="context-menu__item">Duplicate</button>
      <button id="itemContextMenuDelete" class="context-menu__item context-menu__item--danger">Delete</button>
    </div>

    <div id="fileMenuDropdown" class="menu-dropdown hidden">
      <button id="menuNewMod" class="menu-dropdown__item">New Mod</button>
      <button id="menuSaveMod" class="menu-dropdown__item">Save</button>
      <button id="menuPackMod" class="menu-dropdown__item">Pack Current Mod</button>
    </div>

    <div id="editMenuDropdown" class="menu-dropdown hidden">
      <button id="menuUndo" class="menu-dropdown__item">Undo</button>
      <button id="menuRedo" class="menu-dropdown__item">Redo</button>
    </div>

    <div id="viewMenuDropdown" class="menu-dropdown hidden">
      <button id="menuViewMods" class="menu-dropdown__item">Mods List</button>
      <button id="menuViewExplorer" class="menu-dropdown__item">Explorer</button>
      <button id="menuOpenModsFolder" class="menu-dropdown__item">Open Mods Folder</button>
    </div>

    <div id="settingsModal" class="modal hidden">
      <div class="modal__panel modal__panel--settings">
        <div class="modal__header">
          <h2>Settings</h2>
          <button id="closeSettingsModalButton" type="button" class="modal__close">&times;</button>
        </div>
        <form id="settingsForm" class="modal__form">
          <label class="field">
            <span>Language</span>
            <select id="settingsLanguageSelect" class="field__select"></select>
          </label>
          <div class="modal__hint"></div>
          <div class="modal__actions">
            <button id="saveSettingsButton" type="submit" class="toolbar-button toolbar-button--primary">Save</button>
            <button id="cancelSettingsButton" type="button" class="toolbar-button">Close</button>
          </div>
        </form>
      </div>
    </div>

    <datalist id="equipmentSlots"></datalist>

    <script src="../src/renderer.js"></script>
  </body>
</html>
